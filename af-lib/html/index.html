<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- ===== NOTIFICATION ===== -->
    <div id="notification-container" class="notification-container" data-position="top-right"></div>

    <!-- ===== PROGRESS BAR ===== -->
    <div id="progress-container" class="progress-container" style="display: none;">
        <div class="progress-wrapper">
            <div class="progress-header">
                <i class="fas fa-spinner fa-spin"></i>
                <span id="progress-label">Processing...</span>
            </div>
            <div class="progress-body">
                <div class="progress-row">
                    <div class="progress-track">
                        <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
                    </div>
                    <span id="progress-percent" class="progress-percent">0%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== DIALOG ===== -->
    <div id="dialog-overlay" class="dialog-overlay" style="display: none;">
        <div class="dialog-container">
            <div class="dialog-header">
                <div class="dialog-icon">
                    <i class="fas fa-edit"></i>
                </div>
                <span id="dialog-title">Input</span>
                <button class="dialog-close" id="dialog-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="dialog-body" id="dialog-body"></div>
            <div class="dialog-footer">
                <button class="dialog-btn dialog-btn-cancel" id="dialog-cancel">
                    <i class="fas fa-times"></i> Batal
                </button>
                <button class="dialog-btn dialog-btn-confirm" id="dialog-confirm">
                    <i class="fas fa-check"></i> Konfirmasi
                </button>
            </div>
        </div>
    </div>

    <!-- ===== MENU ===== -->
    <div id="menu-overlay" class="menu-overlay" style="display: none;">
        <div class="menu-container">
            <div class="menu-header">
                <div class="menu-header-left">
                    <div class="menu-header-icon"><i class="fas fa-list"></i></div>
                    <span id="menu-title">Menu</span>
                </div>
                <button class="menu-close" id="menu-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="menu-body" id="menu-body"></div>
        </div>
    </div>

    <!-- ===== SLIDER ===== -->
    <div id="slider-overlay" class="slider-overlay" style="display: none;">
        <div class="slider-container">
            <div class="slider-header">
                <div class="slider-icon">
                    <i class="fas fa-sliders-h"></i>
                </div>
                <span id="slider-title">Slider</span>
                <button class="slider-close" id="slider-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="slider-body">
                <p id="slider-description" class="slider-description"></p>
                <div class="slider-value-display">
                    <span id="slider-value">0</span>
                </div>
                <input type="range" id="slider-input" class="slider-input" min="0" max="100" step="1" value="0">
                <div class="slider-range-labels">
                    <span id="slider-min-label">0</span>
                    <span id="slider-max-label">100</span>
                </div>
            </div>
            <div class="slider-footer">
                <button class="slider-btn slider-btn-cancel" id="slider-cancel">
                    <i class="fas fa-times"></i> Batal
                </button>
                <button class="slider-btn slider-btn-confirm" id="slider-confirm">
                    <i class="fas fa-check"></i> Konfirmasi
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
